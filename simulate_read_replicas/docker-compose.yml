services:
  # Primary - accepts all writes, streams WAL to replicas
  postgres_primary:
    image: postgres:18-bookworm
    container_name: replicas_primary
    # Retain enough WAL that multiple replicas can run pg_basebackup concurrently
    # without the primary recycling a segment they still need.
    command: ["postgres", "-c", "wal_keep_size=256MB"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_db
      PGDATA: /var/lib/postgresql/data
    ports:
      - "5436:5432"
    volumes:
      - primary_data:/var/lib/postgresql/data
      - ./init/primary:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Replica 1 - read-only hot standby, clones primary via pg_basebackup
  postgres_replica1:
    image: postgres:18-bookworm
    container_name: replicas_replica1
    environment:
      PGDATA: /var/lib/postgresql/data
      PRIMARY_HOST: postgres_primary
      REPLICATOR_PASSWORD: replicator
    ports:
      - "5437:5432"
    volumes:
      - replica1_data:/var/lib/postgresql/data
      - ./init/replica-entrypoint.sh:/replica-entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/replica-entrypoint.sh"]
    depends_on:
      postgres_primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Replica 2 - second read-only hot standby for read scaling
  postgres_replica2:
    image: postgres:18-bookworm
    container_name: replicas_replica2
    environment:
      PGDATA: /var/lib/postgresql/data
      PRIMARY_HOST: postgres_primary
      REPLICATOR_PASSWORD: replicator
    ports:
      - "5438:5432"
    volumes:
      - replica2_data:/var/lib/postgresql/data
      - ./init/replica-entrypoint.sh:/replica-entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/replica-entrypoint.sh"]
    depends_on:
      postgres_primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  primary_data:
  replica1_data:
  replica2_data:
