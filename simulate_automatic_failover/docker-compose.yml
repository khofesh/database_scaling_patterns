services:
  # Primary - the initial write node. The failover manager stops this container
  # mid-demo to simulate a crash.
  postgres_primary:
    image: postgres:18-bookworm
    container_name: failover_primary
    command: ["postgres", "-c", "wal_keep_size=256MB"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_db
      PGDATA: /var/lib/postgresql/data
    ports:
      - "5470:5432"
    volumes:
      - failover_primary_data:/var/lib/postgresql/data
      - ./init/primary:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Standby - hot standby streaming from the primary. Gets promoted on failover.
  postgres_standby:
    image: postgres:18-bookworm
    container_name: failover_standby
    environment:
      PGDATA: /var/lib/postgresql/data
      PRIMARY_HOST: postgres_primary
      REPLICATOR_PASSWORD: replicator
    ports:
      - "5471:5432"
    volumes:
      - failover_standby_data:/var/lib/postgresql/data
      - ./init/replica-entrypoint.sh:/replica-entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/replica-entrypoint.sh"]
    depends_on:
      postgres_primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  failover_primary_data:
  failover_standby_data:
